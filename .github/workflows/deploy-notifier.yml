name: Deploy Notifier

on:
  pull_request:
    types: [closed]
    branches: [staging]

jobs:
  notify:
    if: github.event.pull_request.merged == true
    runs-on: ubuntu-latest
    env:
      DISCORD_WEBHOOK: ${{ secrets.DISCORD_WEBHOOK }}
      PR_TITLE: ${{ github.event.pull_request.title }}
      PR_BODY: ${{ github.event.pull_request.body }}
      PR_URL: ${{ github.event.pull_request.html_url }}
      PR_ACTOR: ${{ github.event.pull_request.user.login }}
    steps:
      - name: Post to Discord
        if: ${{ env.DISCORD_WEBHOOK != '' }}
        run: |
          truncated_body="${PR_BODY:0:1600}"
          msg="🚀 **$PR_TITLE** merged to *staging* by $PR_ACTOR"$'\n\n'"$truncated_body"

          curl --fail -H "Content-Type: application/json" -X POST "$DISCORD_WEBHOOK" \
            -d "$(jq -n --arg t "$msg" --arg u "$PR_URL" '{content: ($t + "\n" + $u)}')"
